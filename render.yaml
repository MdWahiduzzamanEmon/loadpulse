services:
  # LoadPulse Dashboard (Next.js) — hosted on Render
  # Users run the agent locally: npx loadpulse-agent
  - type: web
    name: loadpulse
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
