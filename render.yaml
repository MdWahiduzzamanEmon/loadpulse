services:
  # LoadPulse Dashboard (Next.js) — hosted on Render
  # Users run the agent locally: npx loadpulse-agent
  - type: web
    name: loadpulse
    runtime: node
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm start -- --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
